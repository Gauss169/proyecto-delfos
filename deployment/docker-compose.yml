version: '3.8'

services:
  trading-bot:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: delfos-trading-bot
    restart: unless-stopped
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET=${BINANCE_SECRET}
    volumes:
      - ../pipeline/logs:/app/pipeline/logs
      - ../pipeline/models:/app/pipeline/models
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
